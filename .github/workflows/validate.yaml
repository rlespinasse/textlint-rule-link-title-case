name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          # https://nodejs.org/en/about/previous-releases#release-schedule
          # Maintenance LTS until may 2026
          - 20
          # Maintenance LTS until may 2027
          - 22
          # Active LTS
          - 24
          # Current
          - 25

    runs-on: ${{ matrix.os }}
    name: Using Node.js ${{ matrix.node-version }} on ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - uses: taiki-e/install-action@a164de717a0ee9284c2d9db1c6016a4c339cd333 # v2.69.14
        with:
          tool: just

      - name: Setup Project
        run: just setup

      - name: Validate all
        run: just validate-all
