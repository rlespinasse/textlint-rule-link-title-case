name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          # https://nodejs.org/en/about/previous-releases#release-schedule
          # Maintenance LTS until may 2026
          - 20
          # Maintenance LTS until may 2027
          - 22
          # Active LTS
          - 24
          # Current
          - 25

    runs-on: ${{ matrix.os }}
    name: Using Node.js ${{ matrix.node-version }} on ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - uses: taiki-e/install-action@b5fddbb5361bce8a06fb168c9d403a6cc552b084 # v2.75.29
        with:
          tool: just

      - name: Setup Project
        run: just setup

      - name: Validate all
        run: just validate-all
